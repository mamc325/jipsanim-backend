# 로컬 개발 인프라. `docker compose up -d` 로 실행.
# application.yml 기본값(DB_NAME=jipsanim, root/root, 3306 / Redis 6379 / ES 9200)과 정렬.
services:
  mysql:
    image: mysql:8.0
    container_name: jipsanim-mysql
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: jipsanim
      TZ: Asia/Seoul
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    volumes:
      - jipsanim-mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7
    container_name: jipsanim-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  # 5차: nori 플러그인 포함 커스텀 이미지(docker/elasticsearch-nori/Dockerfile).
  elasticsearch:
    build:
      context: ./docker/elasticsearch-nori
    container_name: jipsanim-elasticsearch
    ports:
      - "9200:9200"
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: "-Xms512m -Xmx512m"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12

volumes:
  jipsanim-mysql-data:
