# 로컬 개발 인프라. `docker compose up -d` 로 실행.
# application.yml 기본값(DB_NAME=jipsanim, root/root, 3306 / Redis 6379 / ES 9200)과 정렬.
services:
  mysql:
    image: mysql:8.0
    container_name: jipsanim-mysql
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: jipsanim
      TZ: Asia/Seoul
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    volumes:
      - jipsanim-mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7
    container_name: jipsanim-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  # 5차: nori 플러그인 포함 커스텀 이미지(docker/elasticsearch-nori/Dockerfile).
  elasticsearch:
    build:
      context: ./docker/elasticsearch-nori
    container_name: jipsanim-elasticsearch
    ports:
      - "9200:9200"
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: "-Xms512m -Xmx512m"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12

  # 6차: 앱(멀티스테이지 Dockerfile). 서비스명으로 인프라 접속. profile app 로 선택 기동.
  app:
    build:
      context: .
    container_name: jipsanim-app
    ports:
      - "8080:8080"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
    environment:
      DB_HOST: mysql
      REDIS_HOST: redis
      ES_URIS: http://elasticsearch:9200
      # SENTRY_DSN 미설정 → Sentry no-op. 설정 시 여기 주입(커밋 금지).
    profiles: ["app"]

  # 6차 관측성 스택(선택). `docker compose --profile monitoring up -d`
  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: jipsanim-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    profiles: ["monitoring"]

  grafana:
    image: grafana/grafana:11.2.0
    container_name: jipsanim-grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
    volumes:
      - ./docker/grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - prometheus
    profiles: ["monitoring"]

volumes:
  jipsanim-mysql-data:
