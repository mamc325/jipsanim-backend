# 로컬 개발 인프라. `docker compose up -d` 로 실행.
# application.yml 기본값(DB_NAME=jipsanim, root/root, 3306)과 정렬.
# (Redis/Elasticsearch 는 해당 차수에서 아래에 추가)
services:
  mysql:
    image: mysql:8.0
    container_name: jipsanim-mysql
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: jipsanim
      TZ: Asia/Seoul
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    volumes:
      - jipsanim-mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  jipsanim-mysql-data:
