# 6차: CI. 빌드 + 통합 테스트(Testcontainers) + 앱 이미지 빌드. 배포는 제외.
name: build

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest  # Docker 사용 가능(Testcontainers: MySQL/Redis/Elasticsearch)
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build & test (Testcontainers)
        run: ./gradlew build --no-daemon   # load 태그 테스트는 제외(build.gradle.kts)

      - name: Build app image
        run: docker build -t jipsanim-backend:ci .   # push/deploy 없음
